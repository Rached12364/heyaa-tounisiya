# ===== Serveur =====
server.port=8080

# ===== Base de données PostgreSQL =====
# ⚠️ Adapte l'URL, l'utilisateur et le mot de passe à ton installation locale
spring.datasource.url=jdbc:postgresql://localhost:5432/heyaa_tounisiya
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
# "update" en développement : crée/actualise les tables automatiquement.
# Passer à "validate" en production une fois le schéma stabilisé.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== JWT =====
# ⚠️ Change cette clé en production (min. 256 bits). Génère-en une avec :
# openssl rand -base64 64
app.jwt.secret=CHANGE_MOI_CLE_SECRETE_HEYAA_TOUNISIYA_MIN_256_BITS_2026
app.jwt.expiration-ms=86400000

# ===== Logs =====
logging.level.org.springframework.security=INFO
logging.level.com.heyaatounisiya.backend=DEBUG
# ===== Upload de fichiers (documents technicien) =====
app.upload.dir=./uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
