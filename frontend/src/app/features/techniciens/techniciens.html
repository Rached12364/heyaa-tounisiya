<div class="page-header">
  <div class="container">
    <p class="breadcrumb">Accueil > Techniciens</p>
    <h1>Nos Techniciens</h1>
    <p>Trouvez un technicien certifie pres de chez vous</p>
  </div>
</div>
<div class="container">
  <div class="filter-bar">
    <input type="text" [(ngModel)]="searchTerm"
      placeholder="Rechercher un technicien...">
    <select [(ngModel)]="selectedGouvernorat">
      <option value="">Tous les gouvernorats</option>
      <option *ngFor="let g of gouvernorats" [value]="g">{{g}}</option>
    </select>
    <select [(ngModel)]="selectedSpecialite">
      <option value="">Toutes les specialites</option>
      <option *ngFor="let s of specialites" [value]="s">{{s}}</option>
    </select>
    <button class="btn-search">Rechercher</button>
  </div>
  <p *ngIf="loading">Chargement des techniciens...</p>
  <p *ngIf="!loading && errorMessage" class="non-verifie">{{errorMessage}}</p>
  <p *ngIf="!loading && !errorMessage && techniciens.length === 0">Aucun technicien trouve.</p>
  <div class="techniciens-grid" *ngIf="!loading && !errorMessage">
    <div class="technicien-card" *ngFor="let t of techniciens">
      <div class="avatar" [style.background]="t.couleur">{{t.initiales}}</div>
      <h3>{{t.nomComplet}}</h3>
      <span class="badge" [style.background]="t.couleur">{{t.specialite}}</span>
      <p>📍 {{t.gouvernorat}}</p>
      <p>⭐ {{t.experience}} ans experience</p>
      <button class="btn-profil">Voir le profil</button>
    </div>
  </div>
</div>
