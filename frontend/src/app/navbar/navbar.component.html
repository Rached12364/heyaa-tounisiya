<div class="site-shell">
  <div class="top-bar">
    <div class="top-bar__contacts">
      <span>📍 {{ t.topAddress }}</span>
      <span>✉️ {{ t.topEmail }}</span>
      <span>📞 {{ t.topPhone }}</span>
    </div>

    <button class="top-bar__login" type="button">
      <span>{{ t.login }}</span>
      <span class="top-bar__arrow">→</span>
    </button>

    <div class="top-bar__actions">
      <div class="lang-switcher" role="listbox" aria-label="Language selector">
        <button
          type="button"
          *ngFor="let lang of languages"
          [class.active]="currentLang() === lang.code"
          (click)="setLanguage(lang.code)"
        >
          {{ lang.label }}
        </button>
      </div>

      <div class="social-links" aria-label="Social media">
        <a href="#" aria-label="Facebook" title="Facebook">
          <svg viewBox="0 0 24 24"><path d="M14 13.5h2.5l1-4H14v-2c0-1.03 0-2 2-2h1.5V2.14c-.25-.03-1.17-.14-2.24-.14-2.2 0-3.76 1.34-3.76 3.8V9.5H7v4h2.74V22h3.26z"/></svg>
        </a>
        <a href="#" aria-label="Instagram" title="Instagram">
          <svg viewBox="0 0 24 24"><path d="M7 3h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V7a4 4 0 0 1 4-4zm5 5.2A4.8 4.8 0 1 0 16.8 13 4.8 4.8 0 0 0 12 8.2zm6.2-1.7a1.2 1.2 0 1 0 1.2 1.2 1.2 1.2 0 0 0-1.2-1.2z"/></svg>
        </a>
        <a href="#" aria-label="YouTube" title="YouTube">
          <svg viewBox="0 0 24 24"><path d="M21.6 7.2a2.7 2.7 0 0 0-1.9-1.9C18 4.8 12 4.8 12 4.8s-6 0-7.7.5A2.7 2.7 0 0 0 2.4 7.2 28.2 28.2 0 0 0 2 12a28.2 28.2 0 0 0 .4 4.8 2.7 2.7 0 0 0 1.9 1.9C6 19.2 12 19.2 12 19.2s6 0 7.7-.5a2.7 2.7 0 0 0 1.9-1.9A28.2 28.2 0 0 0 22 12a28.2 28.2 0 0 0-.4-4.8ZM10 15.5v-7l6 3.5-6 3.5Z"/></svg>
        </a>
        <a href="#" aria-label="LinkedIn" title="LinkedIn">
          <svg viewBox="0 0 24 24"><path d="M6.94 8.5A1.56 1.56 0 1 0 6.94 5.38a1.56 1.56 0 0 0 0 3.12ZM5.5 9.5h2.88V19H5.5zm4.7 0h2.76v1.3h.04c.38-.72 1.32-1.48 2.72-1.48 2.9 0 3.44 1.91 3.44 4.39V19H16.3v-8.38c0-2-.04-4.57-2.78-4.57-2.79 0-3.22 2.18-3.22 4.42V19H10.2z"/></svg>
        </a>
      </div>
    </div>
  </div>

  <header class="main-nav" [class.scrolled]="navbarScrolled()">
    <a class="brand" href="#">
      <img src="/logo.png" alt="Heyaa Logo" height="80" width="80" style="object-fit: contain;">
      <span class="brand__text">
        <strong>التعاونية التونسية للتقنيين</strong>
        <small>الكهرباء والطاقة المتجددة والأنشطة التابعة</small>
      </span>
    </a>

    <button class="mobile-toggle" type="button" (click)="toggleMenu()" [attr.aria-expanded]="mobileMenuOpen" [attr.aria-label]="t.mobileMenuLabel">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav-links" [class.open]="mobileMenuOpen">
      <a class="nav-link" href="#" *ngFor="let item of menuItems">
        {{ getMenuLabel(item) }}
      </a>
    </nav>

    <div class="nav-flag" aria-label="Tunisia">🇹🇳</div>
  </header>

  <section class="hero">
    <div class="hero__slider">
      <div
        class="hero__slide"
        *ngFor="let slide of slides; let i = index"
        [class.active]="i === currentSlide()"
        [style.background-image]="'url(' + slide + ')'"
      >
        <div class="hero__content">
          <p class="hero__eyebrow">{{ t.heroEyebrow }}</p>
          <h1>{{ t.heroTitle }}</h1>
          <p class="hero__subtitle">{{ t.heroSubtitle }}</p>
          <div class="hero__actions">
            <a class="btn btn--primary" href="#"><span>🔍</span> {{ t.primaryCta }}</a>
            <a class="btn btn--secondary" href="#"><span>📝</span> {{ t.secondaryCta }}</a>
          </div>
        </div>
      </div>
    </div>

    <button class="hero__arrow hero__arrow--left" type="button" (click)="prevSlide()" aria-label="Previous slide">
      ‹
    </button>
    <button class="hero__arrow hero__arrow--right" type="button" (click)="nextSlide()" aria-label="Next slide">
      ›
    </button>

    <div class="hero__dots" aria-label="Slide indicators">
      <button
        type="button"
        class="hero__dot"
        *ngFor="let slide of slides; let i = index"
        [class.active]="i === currentSlide()"
        (click)="goToSlide(i)"
        [attr.aria-label]="'Go to slide ' + (i + 1)"
      ></button>
    </div>
  </section>
</div>
